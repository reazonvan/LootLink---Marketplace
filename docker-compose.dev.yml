services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: lootlink_dev
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_ENGINE: sqlite
      DEBUG: "True"
