name: LootLink CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.13"
  POSTGRES_VERSION: "15"

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/development.txt

      - name: Run Black
        run: black --check .

      - name: Run isort
        run: isort --check-only .

      - name: Run Flake8
        run: flake8 .

      - name: Run Bandit
        run: bandit -r . -c pyproject.toml

      - name: Run Django Check (production settings)
        run: python manage.py check --deploy --fail-level=ERROR
        env:
          DJANGO_SETTINGS_MODULE: config.settings.production
          SECRET_KEY: test-secret-key-for-ci-only-not-for-prod
          ADMIN_URL: ci-admin-7zx2-mgmt/
          PAYMENT_DETAILS_KEY: 4dM2k7HRl9_C5gXTcS9p1g8oC4qO9o6JIxAa-_y0fxc=
          TRUSTED_PROXIES: 127.0.0.1
          DB_NAME: lootlink_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          USE_REDIS: "False"
          DJANGO_ENV: production

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: lootlink_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/development.txt

      - name: Run migrations
        run: python manage.py migrate --noinput
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          SECRET_KEY: test-secret-key-for-ci-only-not-for-prod
          DB_NAME: lootlink_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_URL: redis://localhost:6379/0

      - name: Run tests with coverage
        run: pytest --cov=. --cov-report=xml --cov-report=html
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: False
          DB_NAME: lootlink_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_URL: redis://localhost:6379/0

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Archive coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install safety bandit

      - name: Run Safety check (ignore non-fixable advisories)
        # safety падает на CVE известного уровня; ignore-vuln оставляем под
        # отдельным triage. Сейчас валим билд только на новых HIGH.
        run: safety check --short-report || (echo "Safety found advisories — review report"; safety check --short-report; exit 1)

      - name: Run Bandit (medium+ severity, with project config)
        # -c pyproject.toml исключает tests/venv/migrations.
        # -ll = medium severity (low slim сшумит, в коммитах есть #nosec).
        run: |
          bandit -r . -c pyproject.toml -f json -o bandit-report.json -ll
          bandit -r . -c pyproject.toml -ll

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json

  # Сборка Docker-образа и деплой вынесены на ручной процесс.
  # Включать обратно после настройки секретов DOCKER_USERNAME/DOCKER_PASSWORD
  # и актуального пути до проекта на сервере в deploy-шаге.
