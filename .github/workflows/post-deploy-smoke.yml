name: Post-Deploy Smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Target URL for smoke checks (for example https://lootlink.ru)"
        required: false
        default: "https://lootlink.ru"
      run_journeys:
        description: "Run authenticated user journeys"
        required: false
        type: boolean
        default: true
  repository_dispatch:
    types:
      - post_deploy_smoke

jobs:
  smoke_public:
    name: Public Smoke (Playwright)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve target URL
        id: target
        run: |
          BASE_URL="${{ github.event.inputs.base_url }}"
          if [ -z "$BASE_URL" ]; then BASE_URL="${{ github.event.client_payload.base_url }}"; fi
          if [ -z "$BASE_URL" ]; then BASE_URL="${{ vars.SMOKE_BASE_URL }}"; fi
          if [ -z "$BASE_URL" ]; then BASE_URL="https://lootlink.ru"; fi
          echo "base_url=$BASE_URL" >> "$GITHUB_OUTPUT"
          echo "Target URL: $BASE_URL"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/development.txt
          python -m playwright install --with-deps chromium

      - name: Run public smoke checks
        env:
          SMOKE_LOGIN_USERNAME: ${{ secrets.SMOKE_LOGIN_USERNAME }}
          SMOKE_LOGIN_PASSWORD: ${{ secrets.SMOKE_LOGIN_PASSWORD }}
        run: |
          python scripts/playwright_smoke.py --base-url "${{ steps.target.outputs.base_url }}"

  smoke_user_journeys:
    name: Authenticated User Journeys
    runs-on: ubuntu-latest
    needs: smoke_public
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_journeys == 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve target URL
        id: target
        run: |
          BASE_URL="${{ github.event.inputs.base_url }}"
          if [ -z "$BASE_URL" ]; then BASE_URL="${{ github.event.client_payload.base_url }}"; fi
          if [ -z "$BASE_URL" ]; then BASE_URL="${{ vars.SMOKE_BASE_URL }}"; fi
          if [ -z "$BASE_URL" ]; then BASE_URL="https://lootlink.ru"; fi
          echo "base_url=$BASE_URL" >> "$GITHUB_OUTPUT"
          echo "Target URL: $BASE_URL"

      - name: Validate required secrets
        env:
          SMOKE_SELLER_USERNAME: ${{ secrets.SMOKE_SELLER_USERNAME }}
          SMOKE_SELLER_PASSWORD: ${{ secrets.SMOKE_SELLER_PASSWORD }}
          SMOKE_BUYER_USERNAME: ${{ secrets.SMOKE_BUYER_USERNAME }}
          SMOKE_BUYER_PASSWORD: ${{ secrets.SMOKE_BUYER_PASSWORD }}
        run: |
          missing=0
          for name in SMOKE_SELLER_USERNAME SMOKE_SELLER_PASSWORD SMOKE_BUYER_USERNAME SMOKE_BUYER_PASSWORD; do
            value="${!name}"
            if [ -z "$value" ]; then
              echo "::error::Missing required repository secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/development.txt
          python -m playwright install --with-deps chromium

      - name: Run authenticated user journeys
        env:
          SMOKE_SELLER_USERNAME: ${{ secrets.SMOKE_SELLER_USERNAME }}
          SMOKE_SELLER_PASSWORD: ${{ secrets.SMOKE_SELLER_PASSWORD }}
          SMOKE_BUYER_USERNAME: ${{ secrets.SMOKE_BUYER_USERNAME }}
          SMOKE_BUYER_PASSWORD: ${{ secrets.SMOKE_BUYER_PASSWORD }}
        run: |
          python scripts/playwright_user_journey.py --base-url "${{ steps.target.outputs.base_url }}"
