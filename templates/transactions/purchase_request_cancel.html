{% extends 'base.html' %}
{% block title %}Отменить запрос - LootLink{% endblock %}
{% block content %}
<div class="auth-page">
    <div style="max-width:480px;width:100%;">
        <div class="card-glass" style="text-align:center;">
            <div style="width:64px;height:64px;border-radius:50%;background:var(--color-warning-light);display:flex;align-items:center;justify-content:center;margin:0 auto var(--space-5);">
                <i data-lucide="alert-triangle" style="width:28px;height:28px;color:var(--color-warning);"></i>
            </div>
            <h2 style="font-size:var(--text-xl);font-weight:var(--weight-extrabold);margin-bottom:var(--space-2);">Отменить запрос?</h2>
            <p style="font-size:var(--text-sm);color:var(--text-secondary);margin-bottom:var(--space-5);">
                {{ purchase_request.listing.title }} · {{ purchase_request.listing.seller.username }}
            </p>
            <form method="post">
                {% csrf_token %}
                <div style="display:flex;gap:var(--space-3);justify-content:center;">
                    <a href="{% url 'transactions:purchase_request_detail' purchase_request.pk %}" class="btn btn-ghost">Назад</a>
                    <button type="submit" class="btn btn-danger"><i data-lucide="x-circle"></i> Отменить запрос</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% block extra_js %}<script>lucide.createIcons();</script>{% endblock %}
{% endblock %}
