{% extends 'base.html' %}
{% block title %}404 - Страница не найдена{% endblock %}
{% block content %}
<div class="auth-page">
    <div style="text-align:center;max-width:480px;">
        <div style="font-size:120px;font-weight:var(--weight-extrabold);background:var(--accent-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;">404</div>
        <h1 style="font-size:var(--text-2xl);font-weight:var(--weight-extrabold);margin-bottom:var(--space-3);">Страница не найдена</h1>
        <p style="color:var(--text-secondary);font-size:var(--text-base);margin-bottom:var(--space-6);">Запрашиваемая страница не существует или была удалена</p>
        <div style="display:flex;gap:var(--space-3);justify-content:center;">
            <a href="{% url 'listings:home' %}" class="btn btn-primary"><i data-lucide="home"></i> На главную</a>
            <a href="{% url 'listings:catalog' %}" class="btn btn-secondary"><i data-lucide="grid-3x3"></i> Каталог</a>
        </div>
    </div>
</div>
{% block extra_js %}<script>lucide.createIcons();</script>{% endblock %}
{% endblock %}
