<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Ошибка сервера</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #f0f7ff 0%, #e8f0ff 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #1a1a2e; }
        .wrap { text-align: center; padding: 40px; max-width: 480px; }
        .code { font-size: 120px; font-weight: 800; background: linear-gradient(135deg, #4a90e2, #667eea); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; }
        h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 12px; }
        p { color: #6a6a6a; margin-bottom: 24px; }
        a { display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px; background: linear-gradient(135deg, #4a90e2, #667eea); color: white; text-decoration: none; border-radius: 25px; font-weight: 600; }
        a:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="code">500</div>
        <h1>Ошибка сервера</h1>
        <p>Что-то пошло не так. Мы уже работаем над исправлением.</p>
        <a href="/">&#8592; На главную</a>
    </div>
</body>
</html>
