{% extends 'base.html' %}
{% block title %}Реквизиты - LootLink{% endblock %}
{% block content %}
<div style="padding:var(--space-6) 0 var(--space-12);">
    <div style="max-width:640px;margin:0 auto;">
        <div class="page-header"><h1>Реквизиты</h1></div>

        <div class="card-glass">
            <div style="display:flex;flex-direction:column;gap:var(--space-5);">
                <div style="display:flex;align-items:flex-start;gap:var(--space-3);">
                    <div style="width:40px;height:40px;border-radius:var(--radius-md);background:var(--color-primary-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                        <i data-lucide="building-2" style="width:20px;height:20px;color:var(--accent-primary);"></i>
                    </div>
                    <div>
                        <div style="font-size:var(--text-sm);font-weight:var(--weight-semibold);margin-bottom:2px;">Наименование</div>
                        <div style="font-size:var(--text-sm);color:var(--text-secondary);">LootLink</div>
                    </div>
                </div>
                <div style="display:flex;align-items:flex-start;gap:var(--space-3);">
                    <div style="width:40px;height:40px;border-radius:var(--radius-md);background:var(--color-primary-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                        <i data-lucide="mail" style="width:20px;height:20px;color:var(--accent-primary);"></i>
                    </div>
                    <div>
                        <div style="font-size:var(--text-sm);font-weight:var(--weight-semibold);margin-bottom:2px;">Email</div>
                        <a href="mailto:ivanpetrov20066.ip@gmail.com" style="font-size:var(--text-sm);">ivanpetrov20066.ip@gmail.com</a>
                    </div>
                </div>
                <div style="display:flex;align-items:flex-start;gap:var(--space-3);">
                    <div style="width:40px;height:40px;border-radius:var(--radius-md);background:var(--color-primary-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                        <i data-lucide="headphones" style="width:20px;height:20px;color:var(--accent-primary);"></i>
                    </div>
                    <div>
                        <div style="font-size:var(--text-sm);font-weight:var(--weight-semibold);margin-bottom:2px;">Поддержка</div>
                        <div style="font-size:var(--text-sm);color:var(--text-secondary);">Доступна 24/7 через чат на платформе</div>
                    </div>
                </div>
            </div>
        </div>

        <div style="text-align:center;margin-top:var(--space-6);font-size:var(--text-xs);color:var(--text-tertiary);">
            <a href="{% url 'rules' %}">Правила платформы</a> · <a href="{% url 'listings:home' %}">На главную</a>
        </div>
    </div>
</div>
{% block extra_js %}<script>lucide.createIcons();</script>{% endblock %}
{% endblock %}
