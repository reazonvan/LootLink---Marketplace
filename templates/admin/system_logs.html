{% extends 'base.html' %}
{% block title %}Системные логи - LootLink{% endblock %}
{% block content %}
<div style="padding:var(--space-6) 0 var(--space-12);text-align:center;">
    <i data-lucide="scroll-text" style="width:48px;height:48px;color:var(--accent-primary);margin-bottom:var(--space-4);"></i>
    <h1 style="font-size:var(--text-2xl);margin-bottom:var(--space-3);">Системные логи</h1>
    <p style="color:var(--text-secondary);margin-bottom:var(--space-5);">Просмотр доступен в расширенной панели</p>
    <a href="{% url 'admin_panel:security_logs' %}" class="btn btn-primary"><i data-lucide="shield"></i> Логи безопасности</a>
</div>
{% block extra_js %}<script>lucide.createIcons();</script>{% endblock %}
{% endblock %}
