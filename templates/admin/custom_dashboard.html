{% extends 'base.html' %}
{% block title %}Админ-панель - LootLink{% endblock %}
{% block content %}
<div style="padding:var(--space-6) 0 var(--space-12);text-align:center;">
    <i data-lucide="shield-check" style="width:48px;height:48px;color:var(--accent-primary);margin-bottom:var(--space-4);"></i>
    <h1 style="font-size:var(--text-2xl);margin-bottom:var(--space-3);">Панель администратора</h1>
    <p style="color:var(--text-secondary);margin-bottom:var(--space-5);">Расширенная панель управления доступна по ссылке ниже</p>
    <a href="{% url 'admin_panel:dashboard' %}" class="btn btn-primary"><i data-lucide="layout-dashboard"></i> Открыть админ-панель</a>
</div>
{% block extra_js %}<script>lucide.createIcons();</script>{% endblock %}
{% endblock %}
