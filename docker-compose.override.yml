# Локальный override для dev-окружения.
# Автоматически мерджится с docker-compose.yml при `docker compose up`.
#
# Что меняет:
# - Публикует порт 8000 наружу (web)
# - Переключает БД на PostgreSQL (из контейнера db, не SQLite)
# - Указывает Redis по hostname `redis` (а не localhost)
# - Запускает Django через runserver (вместо daphne) для dev-окружения
#
# ВАЖНО: bind mount исходников НЕ используется — Docker Desktop на Windows
# не всегда корректно резолвит D: drive. Код берётся из образа, для
# изменений нужен `docker compose build web`.
services:
  web:
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DEBUG: "True"
      DB_ENGINE: postgresql
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-lootlink_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_URL: redis://redis:6379/0
      USE_REDIS: "True"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,web
      CSRF_TRUSTED_ORIGINS: http://localhost:8000,http://127.0.0.1:8000
    # volumes переопределяем, чтобы убрать bind-mount media из основного compose
    volumes:
      - staticfiles:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-lootlink_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}

  redis:
    ports:
      - "6379:6379"

  celery_worker:
    command: celery -A config worker -l info --concurrency=2
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DEBUG: "True"
      DB_ENGINE: postgresql
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-lootlink_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_URL: redis://redis:6379/0
      USE_REDIS: "True"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - .:/app

  celery_beat:
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DEBUG: "True"
      DB_ENGINE: postgresql
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-lootlink_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_URL: redis://redis:6379/0
      USE_REDIS: "True"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - .:/app
