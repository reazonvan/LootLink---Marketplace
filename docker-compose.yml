# Bind mount кода: на Windows задайте PROJECT_ROOT в .env (см. env.example.txt)
# или запускайте: .\scripts\docker-compose-up.ps1 up -d
services:
  # PostgreSQL база данных
  db:
    image: postgres:15-alpine
    container_name: lootlink_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-lootlink_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - lootlink_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PgBouncer — connection pooler перед Postgres.
  # Каждый gunicorn worker × replica × celery worker держит CONN_MAX_AGE=600
  # коннект, что мгновенно упирается в postgres max_connections=100.
  # PgBouncer в transaction-mode переиспользует коннекты per-transaction,
  # позволяя сотням приложенческих "соединений" работать через 20-30 реальных.
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: lootlink_pgbouncer
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-lootlink_db}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 500
      DEFAULT_POOL_SIZE: 25
      RESERVE_POOL_SIZE: 5
      SERVER_RESET_QUERY: DISCARD ALL
      AUTH_TYPE: md5
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lootlink_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Migrator — однократный init-сервис.
  # Запускает migrate и завершается; web/celery ждут его через
  # `condition: service_completed_successfully`. Без этого N web-реплик
  # одновременно гоняют migrate → race condition на schema.
  # Подключается к db напрямую (не через pgbouncer), чтобы DDL+savepoint
  # работали корректно — pgbouncer transaction-mode их ломает.
  migrator:
    build: .
    container_name: lootlink_migrator
    command: python manage.py migrate --noinput
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lootlink_network
    restart: "no"

  # Django приложение — gunicorn + uvicorn workers (ASGI/WebSocket).
  # CMD из Dockerfile запускает gunicorn с WEB_CONCURRENCY worker'ами.
  # Миграции и collectstatic вынесены: первое — в init-сервис `migrator`,
  # второе — в build-time RUN в Dockerfile (manifest.json уже внутри образа).
  web:
    build: .
    container_name: lootlink_web
    restart: unless-stopped
    volumes:
      - staticfiles:/app/staticfiles
      - type: bind
        source: ${PROJECT_ROOT:-.}/media
        target: /app/media
      # P0-17: приватный storage для KYC/dispute-evidence.
      # НЕ маунтится в Caddy — раздача только через Django serve view.
      - media_private:/app/media_private
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      # Через pgbouncer, не напрямую в db
      DB_HOST: pgbouncer
      DB_PORT: 5432
    depends_on:
      pgbouncer:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request,sys; req=urllib.request.Request('http://localhost:8000/health/', headers={'X-Forwarded-Proto':'https'}); sys.exit(0 if urllib.request.urlopen(req, timeout=5).status == 200 else 1)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - lootlink_network

  # Redis для кеширования
  redis:
    image: redis:7-alpine
    container_name: lootlink_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - lootlink_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Celery Worker для асинхронных задач
  celery_worker:
    build: .
    container_name: lootlink_celery_worker
    restart: unless-stopped
    command: celery -A config worker -l info --concurrency=2
    volumes:
      - type: bind
        source: ${PROJECT_ROOT:-.}/media
        target: /app/media
      # P0-17: Celery worker должен видеть KYC/dispute файлы
      # (для отправки email с вложениями, генерации thumbnails и т.п.).
      - media_private:/app/media_private
    env_file:
      - .env
    environment:
      DB_HOST: pgbouncer
      DB_PORT: 5432
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    networks:
      - lootlink_network
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Beat для периодических задач
  celery_beat:
    build: .
    container_name: lootlink_celery_beat
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes: []
    env_file:
      - .env
    environment:
      DB_HOST: pgbouncer
      DB_PORT: 5432
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    networks:
      - lootlink_network

  # Flower для мониторинга Celery
  flower:
    build: .
    container_name: lootlink_flower
    restart: unless-stopped
    command: >
      celery -A config flower --port=5555
      --url_prefix=flower
      --basic-auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-changeme}
    expose:
      - "5555"
    env_file:
      - .env
    depends_on:
      - celery_worker
      - redis
    networks:
      - lootlink_network

  # Caddy reverse proxy + automatic HTTPS
  caddy:
    image: caddy:2-alpine
    container_name: lootlink_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/etc/caddy/certs:ro
      - staticfiles:/srv/static:ro
      - ./media:/srv/media:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
    networks:
      - lootlink_network

volumes:
  postgres_data:
  redis_data:
  staticfiles:
  caddy_data:
  caddy_config:
  # P0-17: приватный storage для KYC/dispute evidence — не для публичной раздачи
  media_private:

networks:
  lootlink_network:
    driver: bridge
